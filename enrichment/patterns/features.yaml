    - '\bcertifi[ée]e?\s+Minergie\b'
  it:
    - '\bMinergie(?:-[APE])?(?:-[APE])?\b'
    - '\bcertificat[oa]\s+Minergie\b'
  en:
    - '\bMinergie(?:-[APE])?(?:-[APE])?\b'
    - '\bMinergie[- ]certified\b'
