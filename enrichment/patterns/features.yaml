    - '\bbarrierefrei\b'
    - '\bbehindertengerecht\b'
  fr:
    - '\baccessible\s+(?:aux\s+)?(?:handicap[ée]s|fauteuils?\s+roulants?)\b'
    - '\bsans\s+barri[èe]res?\b'
  it:
