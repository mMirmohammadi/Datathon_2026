    - '\bWaschmaschine\s+in\s+der\s+Wohnung\b'
    - '\bWaschturm\b'
    - '\beigener\s+Trockner\b'
  fr:
    - '\bmachine\s+à\s+laver\s+priv[ée]e?\b'
    - '\blave[- ]linge\s+dans\s+le\s+logement\b'
  it:
